name: ASG-EC2에 배포하는 CI/CD 파이프라인
on:
  push:
    branches: ["main"]
jobs:
  build-and-deploy:
    name: 빌드 및 배포
    # GitHub Runner가 사용 할 운영체제 선택
    runs-on: ubuntu-latest

    steps:
      - name: 1. 깃허브 러너(일꾼) 호출
        uses: actions/checkout@v4

      - name: 2. 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: 3. config, html S3에 업로드
        run: |
          # aws s3 cp ./default.conf s3://${{ secrets.S3_BUCKET_NAME }}/config/default.conf
          aws s3 sync ./html/ s3://${{ secrets.S3_BUCKET_NAME }}/html/ --delete
      - name: 4. ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 5. 빌드 및 ECR에 도커이미지 push
        # github.sha를 태그로 사용할 수 있게 환경변수에 ID 값을 저장한다.(이걸 태그로 사용함)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
      
        # targets를 이용해 인스턴스 지정
      - name: 6. SSM을 이용한 EC2 배포
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Namespace,Values=st2-asg" \
            --parameters 'commands=[
                "sudo aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/html/ /home/ec2-user/nginx/html/ --delete",
                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ step.login-ecr.outputs.registry }}",
                "sudo docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"
            ]' \
            --region ${{ secrets.AWS_REGION }}