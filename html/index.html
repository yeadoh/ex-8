<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>수정1차</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { color: #333; text-align: center; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 10px 0; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        .check { cursor: pointer; color: #4caf50; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📅 오늘의 할 일</h2>
        <ul>
            <li>HTML 공부하기 <span class="check">✓</span></li>
            <li>맛있는 점심 먹기 <span class="check">✓</span></li>
            <li>가벼운 산책하기 <span class="check">✓</span></li>
        </ul>
    </div>
</body>
</html>
